name: Security Audit

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  schedule:
    # Tous les lundis à 08h00 UTC — détecte les CVE publiées en dehors des commits
    - cron: '0 8 * * 1'

jobs:
  # ── Job 1 : vulnérabilités npm ──────────────────────────────────────────
  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # 1. Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Node.js 20
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      # 3. Install — on utilise npm install (pas ci) car Expo nécessite
      #    --legacy-peer-deps, ce qui exclut react-dom/scheduler du lock file
      #    et fait échouer npm ci.
      - name: Install dependencies
        run: npm install --legacy-peer-deps --prefer-offline

      # 4. Audit : bloque sur HIGH+ seulement
      - name: Run npm audit (fail on high+)
        id: audit
        run: |
          npm audit --audit-level high --json > audit-report.json || true
          node - <<'EOF'
          const fs = require('fs');
          const report = JSON.parse(fs.readFileSync('audit-report.json', 'utf8'));
          const meta   = report.metadata || {};
          const vulns  = meta.vulnerabilities || {};

          const critical = vulns.critical || 0;
          const high     = vulns.high     || 0;
          const moderate = vulns.moderate || 0;
          const low      = vulns.low      || 0;
          const total    = vulns.total    || (critical + high + moderate + low);

          console.log(`\n📊 Résumé des vulnérabilités :`);
          console.log(`  🔴 Critical : ${critical}`);
          console.log(`  🟠 High     : ${high}`);
          console.log(`  🟡 Moderate : ${moderate}`);
          console.log(`  🔵 Low      : ${low}`);
          console.log(`  Total       : ${total}\n`);

          if (critical + high > 0) {
            console.error(`❌ Build bloqué : ${critical} critical + ${high} high vulnérabilité(s) détectée(s).`);
            process.exit(1);
          }

          if (moderate > 0) {
            console.warn(`⚠️  ${moderate} vulnérabilité(s) modérée(s) — non bloquant, à corriger prochainement.`);
          }

          console.log('✅ Aucune vulnérabilité critique ou haute détectée.');
          EOF

      # 5. Upload rapport JSON
      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: audit-report.json
          retention-days: 30

      # 6. Résumé dans le job summary GitHub
      - name: Post summary
        if: always()
        run: |
          echo "## 🔐 npm audit — Résultats" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Niveau | Nombre |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|" >> $GITHUB_STEP_SUMMARY
          node - <<'EOF' >> $GITHUB_STEP_SUMMARY
          const fs = require('fs');
          try {
            const report = JSON.parse(fs.readFileSync('audit-report.json', 'utf8'));
            const v = (report.metadata || {}).vulnerabilities || {};
            console.log(`| 🔴 Critical | ${v.critical || 0} |`);
            console.log(`| 🟠 High     | ${v.high     || 0} |`);
            console.log(`| 🟡 Moderate | ${v.moderate || 0} |`);
            console.log(`| 🔵 Low      | ${v.low      || 0} |`);
            console.log(`| **Total**   | **${v.total  || 0}** |`);
          } catch { console.log('| Erreur de lecture du rapport | — |'); }
          EOF

  # ── Job 2 : scan de secrets ─────────────────────────────────────────────
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # Fetch complet pour que gitleaks puisse lire tout l'historique
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Installation manuelle de gitleaks pour contourner le bug de
      # gitleaks-action@v2 sur les dépôts dont le commit initial n'a
      # pas de parent (SHA^  = "ambiguous argument" fatal).
      - name: Install Gitleaks
        run: |
          VERSION="8.24.3"
          URL="https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz"
          curl -sSfL "$URL" -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /usr/local/bin gitleaks
          chmod +x /usr/local/bin/gitleaks
          gitleaks version

      # Scan de tout l'arbre de source (mode répertoire, pas git-log)
      # → insensible au problème du 1er commit sans parent.
      - name: Run Gitleaks (source scan)
        run: |
          gitleaks detect \
            --source . \
            --redact \
            --verbose \
            --exit-code 2 \
            --report-format sarif \
            --report-path gitleaks-results.sarif \
            --no-git
        # exit-code 2 = fuite détectée ; 0 = propre ; 1 = erreur outil

      # Upload du rapport SARIF (visible dans Security → Code scanning)
      - name: Upload SARIF report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-results.sarif
          path: gitleaks-results.sarif
          retention-days: 30
